# render.yaml
# Render.com Blueprint — deploys the C2 server as a Web Service.
# Commit this file to the root of your repo. Render auto-detects it.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: rmm-c2-server
    runtime: node
    plan: starter          # Upgrade to Standard for production SLAs
    region: oregon         # Choose closest to your agents
    branch: main

    buildCommand: npm ci && npm run db:generate && npm run db:migrate
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: rmm-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true    # Render generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 8h
      - key: ALLOWED_ORIGINS
        value: https://your-dashboard.vercel.app  # Lock down before go-live
      - key: RATE_LIMIT_WINDOW_MS
        value: "60000"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"

databases:
  - name: rmm-postgres
    databaseName: rmm_db
    plan: starter            # Free tier; upgrade for production
    region: oregon
